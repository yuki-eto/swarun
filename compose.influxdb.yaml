services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=swarun
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  controller:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - controller_data:/app/data
    environment:
      - SWARUN_PORT=8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_DATA_DIR=/app/data
      - SWARUN_METRICS_BACKEND=influxdb
      - SWARUN_INFLUXDB_URL=http://influxdb:8086
      - SWARUN_INFLUXDB_TOKEN=my-super-secret-auth-token
      - SWARUN_INFLUXDB_ORG=myorg
      - SWARUN_INFLUXDB_BUCKET=swarun
    command: ["-mode", "controller"]
    depends_on:
      influxdb:
        condition: service_healthy

  worker:
    build: .
    environment:
      - SWARUN_CONTROLLER_ADDR=http://controller:8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_WORKER_ID=worker-1
    command: ["-mode", "worker"]
    depends_on:
      - controller

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://controller:8080
    depends_on:
      - controller

volumes:
  influxdb_data:
  controller_data:
