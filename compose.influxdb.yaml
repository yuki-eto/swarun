services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=swarun
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  controller:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - controller_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SWARUN_PORT=8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_LOG_FORMAT=text
      - SWARUN_DATA_DIR=/app/data
      - SWARUN_METRICS_BACKEND=influxdb
      - SWARUN_INFLUXDB_URL=http://influxdb:8086
      - SWARUN_INFLUXDB_TOKEN=my-super-secret-auth-token
      - SWARUN_INFLUXDB_ORG=myorg
      - SWARUN_INFLUXDB_BUCKET=swarun
      - SWARUN_PLATFORM=docker
      - SWARUN_DOCKER_IMAGE=swarun:latest
      - SWARUN_TIMEZONE=Asia/Tokyo
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - default

  worker:
    build: .
    environment:
      - SWARUN_CONTROLLER_ADDR=http://controller:8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_WORKER_ID=worker-1
    command: ["-mode", "worker"]
    depends_on:
      - controller
    networks:
      - default

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://controller:8080
    depends_on:
      - controller
    networks:
      - default

networks:
  default:
    name: swarun_influxdb_default

volumes:
  influxdb_data:
  controller_data:
