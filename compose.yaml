services:
  controller:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - controller_data:/app/data
    environment:
      - SWARUN_PORT=8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_DATA_DIR=/app/data
      - SWARUN_METRICS_BACKEND=duckdb
    command: ["-mode", "controller"]

  worker:
    build: .
    environment:
      - SWARUN_CONTROLLER_ADDR=http://controller:8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_WORKER_ID=worker-1
    command: ["-mode", "worker"]
    depends_on:
      - controller

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://controller:8080
    depends_on:
      - controller

volumes:
  controller_data:
