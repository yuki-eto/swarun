services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - controller_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SWARUN_PORT=8080
      - SWARUN_LOG_LEVEL=debug
      - SWARUN_LOG_FORMAT=text
      - SWARUN_DATA_DIR=/app/data
      - SWARUN_METRICS_BACKEND=duckdb
      - SWARUN_PLATFORM=docker
      - SWARUN_DOCKER_IMAGE=swarun:latest
      - SWARUN_TIMEZONE=Asia/Tokyo
    networks:
      - default

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://controller:8080
      - VITE_S3_ENABLED=false
    depends_on:
      - controller
    networks:
      - default

networks:
  default:
    name: swarun_default
    external: true

volumes:
  controller_data:
