version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/yuki-eto/swarun/gen/proto/v1;swarunv1
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: gen/proto/v1
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.18.1
    out: gen/proto/v1
    opt: paths=source_relative
